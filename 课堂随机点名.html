<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂随机点名</title>
    <style>
        :root {
            --ball-size: 450px;
            --text-color: #00ffff;
            --page-text: #ffffff;
            --accent: #00ffff;
            --accent-ink: #061216;
            --accent-soft: rgba(0, 255, 255, 0.18);
            --page-bg: radial-gradient(ellipse at center, #1b2735 0%, #090a0f 100%);
            --title-shadow: #00ffff;
            --button-grad-a: #ff00cc;
            --button-grad-b: #3333ff;
            --control-bg: rgba(255, 255, 255, 0.10);
            --control-border: rgba(255, 255, 255, 0.20);
            --control-shadow: rgba(0, 0, 0, 0.50);
            --result-overlay: rgba(0, 0, 0, 0.85);
            --result-bg: rgba(255, 255, 255, 0.05);
            --result-border: #ffd700;
            --result-text: #ffd700;
            --result-shadow: rgba(255, 215, 0, 0.40);
            --star-color: #ffffff;
            --stars-opacity: 1;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: var(--page-bg);
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--page-text);
            perspective: 1000px;
            user-select: none;
        }

        /* 内置主题 */
        body[data-theme="warm"] {
            --text-color: #fff0d7;
            --page-text: #fff7ec;
            --accent: #ffca7b;
            --accent-ink: #382412;
            --accent-soft: rgba(255, 202, 123, 0.18);
            --page-bg: radial-gradient(ellipse at center, #6b4b36 0%, #251916 100%);
            --title-shadow: #ffbd73;
            --button-grad-a: #e98b52;
            --button-grad-b: #a74a45;
            --control-bg: rgba(72, 42, 28, 0.38);
            --control-border: rgba(255, 225, 192, 0.22);
            --control-shadow: rgba(28, 14, 8, 0.52);
            --result-overlay: rgba(37, 25, 22, 0.87);
            --result-bg: rgba(255, 235, 206, 0.08);
            --result-border: #ffd69a;
            --result-text: #ffd69a;
            --result-shadow: rgba(255, 189, 115, 0.42);
        }

        body[data-theme="minimal"] {
            --text-color: #30363d;
            --page-text: #30363d;
            --accent: #56616f;
            --accent-ink: #ffffff;
            --accent-soft: rgba(85, 95, 109, 0.14);
            --page-bg: linear-gradient(135deg, #f7f6f2 0%, #dce3e7 100%);
            --title-shadow: rgba(85, 95, 109, 0.35);
            --button-grad-a: #66717e;
            --button-grad-b: #3f4854;
            --control-bg: rgba(255, 255, 255, 0.54);
            --control-border: rgba(48, 54, 61, 0.16);
            --control-shadow: rgba(48, 54, 61, 0.12);
            --result-overlay: rgba(236, 240, 240, 0.84);
            --result-bg: rgba(255, 255, 255, 0.72);
            --result-border: #637180;
            --result-text: #39434e;
            --result-shadow: rgba(65, 75, 85, 0.24);
            --star-color: #687482;
            --stars-opacity: 0.16;
        }

        body[data-theme="blackboard"] {
            --text-color: #f4f1df;
            --page-text: #f4f1df;
            --accent: #dbcf96;
            --accent-ink: #25312a;
            --accent-soft: rgba(219, 207, 150, 0.18);
            --page-bg: radial-gradient(ellipse at center, #36433b 0%, #151e1a 100%);
            --title-shadow: #dbcf96;
            --button-grad-a: #8c9a73;
            --button-grad-b: #53644c;
            --control-bg: rgba(42, 57, 48, 0.55);
            --control-border: rgba(231, 222, 178, 0.22);
            --control-shadow: rgba(7, 14, 10, 0.55);
            --result-overlay: rgba(19, 29, 24, 0.88);
            --result-bg: rgba(245, 241, 218, 0.07);
            --result-border: #e5d79b;
            --result-text: #f5e6a9;
            --result-shadow: rgba(229, 215, 155, 0.34);
            --stars-opacity: 0.45;
        }

        body[data-theme="sakura"] {
            --text-color: #9b4967;
            --page-text: #6f3b51;
            --accent: #ea8eae;
            --accent-ink: #ffffff;
            --accent-soft: rgba(234, 142, 174, 0.18);
            --page-bg: radial-gradient(circle at 50% 32%, #fff8fa 0%, #fbdde7 47%, #eab3c4 100%);
            --title-shadow: rgba(224, 112, 153, 0.42);
            --button-grad-a: #f39ab9;
            --button-grad-b: #cc6f96;
            --control-bg: rgba(255, 255, 255, 0.56);
            --control-border: rgba(188, 94, 133, 0.21);
            --control-shadow: rgba(156, 70, 106, 0.17);
            --result-overlay: rgba(253, 234, 241, 0.87);
            --result-bg: rgba(255, 255, 255, 0.72);
            --result-border: #dd7fa3;
            --result-text: #b34470;
            --result-shadow: rgba(205, 91, 137, 0.28);
            --star-color: #e481aa;
            --stars-opacity: 0.22;
        }

        body[data-theme="ocean"] {
            --text-color: #7fe7ff;
            --page-text: #e1f9ff;
            --accent: #57d7ff;
            --accent-ink: #062036;
            --accent-soft: rgba(87, 215, 255, 0.18);
            --page-bg: radial-gradient(ellipse at center, #123c5b 0%, #061421 66%, #03080f 100%);
            --title-shadow: #3bd2ff;
            --button-grad-a: #00bde6;
            --button-grad-b: #315dcb;
            --control-bg: rgba(12, 48, 72, 0.46);
            --control-border: rgba(141, 231, 255, 0.22);
            --control-shadow: rgba(0, 7, 17, 0.58);
            --result-overlay: rgba(3, 19, 31, 0.89);
            --result-bg: rgba(76, 198, 234, 0.08);
            --result-border: #6de2ff;
            --result-text: #89eaff;
            --result-shadow: rgba(49, 210, 255, 0.36);
            --star-color: #bdefff;
            --stars-opacity: 0.66;
        }

        body[data-theme="forest"] {
            --text-color: #2e5e49;
            --page-text: #264535;
            --accent: #6b9c72;
            --accent-ink: #ffffff;
            --accent-soft: rgba(107, 156, 114, 0.18);
            --page-bg: radial-gradient(circle at 50% 20%, #f7fbef 0%, #dfead4 48%, #b8caa9 100%);
            --title-shadow: rgba(87, 135, 91, 0.34);
            --button-grad-a: #8bb07b;
            --button-grad-b: #517b62;
            --control-bg: rgba(255, 255, 251, 0.49);
            --control-border: rgba(57, 105, 72, 0.18);
            --control-shadow: rgba(47, 86, 56, 0.16);
            --result-overlay: rgba(230, 243, 223, 0.86);
            --result-bg: rgba(255, 255, 252, 0.70);
            --result-border: #6a9c70;
            --result-text: #3d7050;
            --result-shadow: rgba(74, 126, 82, 0.26);
            --star-color: #6a9b73;
            --stars-opacity: 0.16;
        }

        body[data-theme="royal"] {
            --text-color: #ffd98a;
            --page-text: #fff2ce;
            --accent: #efc96e;
            --accent-ink: #4b0f15;
            --accent-soft: rgba(239, 201, 110, 0.18);
            --page-bg: radial-gradient(ellipse at center, #8b2233 0%, #4b0d18 60%, #21060b 100%);
            --title-shadow: #efc96e;
            --button-grad-a: #c7434d;
            --button-grad-b: #7e1728;
            --control-bg: rgba(97, 18, 31, 0.42);
            --control-border: rgba(255, 222, 157, 0.24);
            --control-shadow: rgba(30, 0, 6, 0.60);
            --result-overlay: rgba(51, 7, 15, 0.89);
            --result-bg: rgba(255, 229, 169, 0.07);
            --result-border: #f1ce78;
            --result-text: #ffe1a1;
            --result-shadow: rgba(238, 184, 77, 0.38);
            --star-color: #ffdb8a;
            --stars-opacity: 0.52;
        }

        body[data-theme="lavender"] {
            --text-color: #805ca7;
            --page-text: #614582;
            --accent: #9a7fc3;
            --accent-ink: #ffffff;
            --accent-soft: rgba(154, 127, 195, 0.18);
            --page-bg: radial-gradient(circle at 50% 22%, #fcfaff 0%, #e8def4 50%, #c9b9dd 100%);
            --title-shadow: rgba(133, 96, 177, 0.38);
            --button-grad-a: #b094dd;
            --button-grad-b: #7659a2;
            --control-bg: rgba(255, 255, 255, 0.52);
            --control-border: rgba(105, 74, 145, 0.20);
            --control-shadow: rgba(93, 62, 125, 0.16);
            --result-overlay: rgba(243, 237, 250, 0.88);
            --result-bg: rgba(255, 255, 255, 0.72);
            --result-border: #9875c1;
            --result-text: #6e4d96;
            --result-shadow: rgba(130, 92, 173, 0.26);
            --star-color: #9a7bc1;
            --stars-opacity: 0.18;
        }

        h1 {
            position: absolute;
            top: 30px;
            font-size: 2.5rem;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--title-shadow), 0 0 20px var(--title-shadow);
            z-index: 100;
            letter-spacing: 5px;
            margin: 0;
            pointer-events: none;
        }

        .stars {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            opacity: 0.8;
        }

        .stars { opacity: var(--stars-opacity); }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .scene {
            position: relative;
            width: var(--ball-size);
            height: var(--ball-size);
            transform-style: preserve-3d;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ball {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
        }

        .name-tag {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 5px color-mix(in srgb, var(--accent) 75%, transparent);
            white-space: nowrap;
            will-change: transform, opacity;
            margin-left: -25px;
            margin-top: -12px;
        }

        .controls {
            position: absolute;
            bottom: 8%;
            display: flex;
            gap: 20px;
            z-index: 100;
            background: var(--control-bg);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--control-border);
            box-shadow: 0 10px 30px var(--control-shadow);
        }

        button {
            padding: 10px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            outline: none;
            font-family: inherit;
        }

        .btn-count {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .btn-count.active {
            background: var(--accent);
            color: var(--accent-ink);
            box-shadow: 0 0 15px var(--accent);
        }

        .btn-start {
            background: linear-gradient(45deg, var(--button-grad-a), var(--button-grad-b));
            color: white;
            font-size: 1.3rem;
            padding: 10px 40px;
            box-shadow: 0 0 20px color-mix(in srgb, var(--button-grad-a) 45%, transparent);
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px color-mix(in srgb, var(--button-grad-a) 65%, transparent);
        }

        .btn-start:active { transform: scale(0.95); }

        .btn-start.stopping {
            background: linear-gradient(45deg, #ff3333, #cc0000);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
        }

        .result-overlay,
        .access-layer,
        .settings-layer {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }

        .result-overlay {
            background: var(--result-overlay);
            z-index: 200;
        }

        .result-container {
            display: flex;
            gap: 60px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 90%;
        }

        .winner-card {
            background: var(--result-bg);
            border: 2px solid var(--result-border);
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 40px var(--result-shadow);
            min-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .winner-name {
            font-size: 3rem;
            color: var(--result-text);
            font-weight: bold;
            text-shadow: 0 0 15px var(--result-text), 0 0 30px var(--result-shadow);
            letter-spacing: 2px;
            animation: glow 2s infinite alternate;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--result-text), 0 0 20px var(--result-shadow); }
            to { text-shadow: 0 0 20px var(--result-text), 0 0 40px var(--result-shadow), 0 0 60px var(--result-shadow); }
        }

        #confetti-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 201;
        }

        .close-btn {
            margin-top: 60px;
            background: transparent;
            border: 2px solid var(--result-text);
            color: var(--result-text);
            padding: 12px 35px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: var(--result-text);
            color: var(--accent-ink);
            box-shadow: 0 0 15px var(--result-text);
        }

        /* 极低存在感的页角标记：视觉仅为 3 个 4px 圆点，实际点击区为其约两倍 */
        .footer-mark {
            position: fixed;
            left: 8px;
            bottom: 8px;
            width: 36px;
            height: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            z-index: 4;
            opacity: 0.15;
        }

        .footer-mark span {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            display: block;
        }

        .access-layer,
        .settings-layer {
            background: rgba(7, 10, 14, 0.72);
            z-index: 500;
            padding: 18px;
        }

        .pass-card,
        .settings-card {
            width: min(94vw, 720px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(20, 25, 32, 0.95);
            border-radius: 18px;
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.5);
            color: #f6f8fb;
        }

        .pass-card {
            width: min(90vw, 340px);
            padding: 28px;
        }

        .pass-card h2,
        .settings-card h2 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 0.04em;
        }

        .pass-card p,
        .settings-hint {
            margin: 10px 0 0;
            font-size: 0.88rem;
            line-height: 1.55;
            color: rgba(246, 248, 251, 0.62);
        }

        .pass-card input,
        .settings-card input,
        .settings-card textarea {
            width: 100%;
            margin-top: 16px;
            border: 1px solid rgba(255, 255, 255, 0.17);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-radius: 10px;
            padding: 11px 12px;
            outline: none;
            font: inherit;
        }

        .pass-card input:focus,
        .settings-card input:focus,
        .settings-card textarea:focus {
            border-color: rgba(117, 210, 255, 0.9);
            box-shadow: 0 0 0 3px rgba(117, 210, 255, 0.12);
        }

        /* 自定义风格选择器：避免浏览器原生 select 弹层在部分设备上被异常放大 */
        .theme-picker {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 16px;
        }

        .theme-choice {
            position: relative;
            min-height: 42px;
            padding: 8px 8px 8px 10px;
            display: flex;
            align-items: center;
            gap: 7px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.055);
            color: rgba(246, 248, 251, 0.88);
            font: inherit;
            font-size: 0.76rem;
            line-height: 1.18;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
        }

        .theme-choice:hover {
            background: rgba(255, 255, 255, 0.10);
            transform: translateY(-1px);
        }

        .theme-choice.is-selected {
            border-color: #75d2ff;
            background: rgba(117, 210, 255, 0.16);
            box-shadow: 0 0 0 2px rgba(117, 210, 255, 0.12);
            color: #ffffff;
        }

        .theme-dot {
            width: 15px;
            height: 15px;
            flex: 0 0 15px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.26);
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.12);
        }

        .theme-dot.starry { background: radial-gradient(circle at 32% 30%, #8affff 0 12%, #1b2735 34%, #090a0f 100%); }
        .theme-dot.warm { background: radial-gradient(circle at 35% 28%, #ffd18a 0 12%, #6b4b36 35%, #251916 100%); }
        .theme-dot.minimal { background: linear-gradient(135deg, #ffffff 0%, #dce3e7 100%); }
        .theme-dot.blackboard { background: radial-gradient(circle at 42% 30%, #8f9b76 0 12%, #36433b 38%, #151e1a 100%); }
        .theme-dot.sakura { background: radial-gradient(circle at 40% 25%, #fffafd 0 18%, #f6c4d4 52%, #db8ead 100%); }
        .theme-dot.ocean { background: radial-gradient(circle at 38% 28%, #71e5ff 0 12%, #123c5b 36%, #03080f 100%); }
        .theme-dot.forest { background: radial-gradient(circle at 42% 26%, #f7fbef 0 16%, #dfead4 45%, #719271 100%); }
        .theme-dot.royal { background: radial-gradient(circle at 38% 30%, #ffd982 0 12%, #8b2233 39%, #21060b 100%); }
        .theme-dot.lavender { background: radial-gradient(circle at 38% 27%, #ffffff 0 16%, #e8def4 48%, #9075b4 100%); }

        @media (max-width: 560px) {
            .theme-picker { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        .pass-error {
            min-height: 18px;
            margin-top: 8px;
            font-size: 0.82rem;
            color: #ff9b9b;
        }

        .pass-actions,
        .settings-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }

        .settings-layer .settings-actions {
            align-items: flex-end;
            justify-content: space-between;
        }

        .settings-actions-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .settings-layer .restore-default {
            min-height: auto;
            padding: 0 2px !important;
            border: 0 !important;
            background: transparent !important;
            color: rgba(246, 248, 251, 0.62);
            font-size: 0.78rem;
            font-weight: normal;
            text-decoration: underline;
            text-underline-offset: 3px;
            box-shadow: none !important;
        }

        .settings-layer .restore-default:hover {
            color: #9edfff;
            transform: none;
        }

        .pass-actions button,
        .settings-actions button {
            font-size: 0.9rem;
            padding: 10px 16px;
            color: #fff;
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .pass-actions .primary,
        .settings-actions .primary {
            background: linear-gradient(45deg, #4776e6, #8e54e9);
            border-color: transparent;
        }

        .settings-card {
            max-height: min(86vh, 780px);
            overflow: auto;
            padding: 24px;
        }

        .settings-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }

        .field-label {
            display: block;
            font-size: 0.86rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.82);
        }

        .field-label small {
            display: block;
            margin-top: 4px;
            font-size: 0.76rem;
            font-weight: normal;
            color: rgba(255, 255, 255, 0.48);
            line-height: 1.35;
        }

        .full-field { grid-column: 1 / -1; }

        .range-field {
            display: grid;
            grid-template-columns: 1fr 64px;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .range-field input[type="range"] {
            margin: 0;
            padding: 0;
            accent-color: #8e54e9;
        }

        .range-value {
            margin: 0 !important;
            text-align: center;
        }

        .roster-tools {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 22px 0 10px;
        }

        .roster-tools h3 {
            margin: 0;
            font-size: 1rem;
        }

        .roster-tools button,
        .roster-table button {
            padding: 7px 10px;
            font-size: 0.8rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
        }

        .roster-table-wrap {
            max-height: 260px;
            overflow: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        function isPasswordRecord(record) {
            return Boolean(
                record &&
                typeof record.salt === "string" &&
                typeof record.hash === "string" &&
                Number.isInteger(Number(record.iterations)) &&
                Number(record.iterations) >= 100000
            );
        }

        async function createPasswordRecord(password) {
            assertCryptoReady();
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iterations = 210000;
            const baseKey = await crypto.subtle.importKey(
                "raw",
                new TextEncoder().encode(password),
                "PBKDF2",
                false,
                ["deriveBits"]
            );
            const hash = await crypto.subtle.deriveBits(
                { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
                baseKey,
                256
            );
            return { salt: toBase64(salt), hash: toBase64(new Uint8Array(hash)), iterations };
        }

        async function verifyPasswordRecord(password, record) {
            if (!isPasswordRecord(record)) return false;
            try {
                const baseKey = await crypto.subtle.importKey(
                    "raw",
                    new TextEncoder().encode(password),
                    "PBKDF2",
                    false,
                    ["deriveBits"]
                );
                const calculated = new Uint8Array(await crypto.subtle.deriveBits(
                    { name: "PBKDF2", salt: fromBase64(record.salt), iterations: Number(record.iterations), hash: "SHA-256" },
                    baseKey,
                    256
                ));
                return constantTimeEqual(calculated, fromBase64(record.hash));
            } catch (error) {
                return false;
            }
        }

        function sanitizeRoster(roster) {
            const seen = new Set();
            const clean = [];
            (Array.isArray(roster) ? roster : []).forEach(item => {
                const name = String(item && item.name !== undefined ? item.name : "").trim().slice(0, 40);
                const weight = clampNumber(item && item.weight, 0, 9999, 1);
                const enabled = !item || item.enabled !== false;
                if (name && !seen.has(name)) {
                    seen.add(name);
                    clean.push({ name, weight, enabled });
                }
            });
            return clean;
        }

        function normalizeConfig(raw, defaults) {
            const roster = sanitizeRoster(raw && raw.roster);
            return {
                title: typeof raw?.title === "string" && raw.title.trim() ? raw.title.trim().slice(0, 30) : defaults.title,
                theme: supportedThemes.includes(raw?.theme) ? raw.theme : defaults.theme,
                repeatChance: clampNumber(raw?.repeatChance, 0, 100, defaults.repeatChance),
                roster: roster.length ? roster : cloneValue(defaults.roster),
                auth: isPasswordRecord(raw?.auth) ? raw.auth : cloneValue(defaults.auth)
            };
        }

        async function getEmbeddedDefaultConfig() {
            if (!embeddedDefaultPromise) {
                embeddedDefaultPromise = (async () => {
                    const raw = await decryptPayload(defaultSecureBlob);
                    const roster = sanitizeRoster(raw.roster);
                    if (!roster.length || !isPasswordRecord(raw.auth)) throw new Error("内置加密配置无效。");
                    return {
                        title: typeof raw.title === "string" && raw.title.trim() ? raw.title.trim().slice(0, 30) : emptyConfig.title,
                        theme: supportedThemes.includes(raw.theme) ? raw.theme : emptyConfig.theme,
                        repeatChance: clampNumber(raw.repeatChance, 0, 100, 0),
                        roster,
                        auth: raw.auth
                    };
                })();
            }
            return cloneValue(await embeddedDefaultPromise);
        }

        function readLegacyConfig() {
            try {
                const legacy = JSON.parse(localStorage.getItem(legacyStorageKey));
                return legacy && typeof legacy === "object" ? legacy : null;
            } catch (error) {
                return null;
            }
        }

        async function loadConfig() {
            const defaults = await getEmbeddedDefaultConfig();
            try {
                const encrypted = localStorage.getItem(secureStorageKey);
                if (encrypted) {
                    const raw = await decryptPayload(JSON.parse(encrypted));
                    return normalizeConfig(raw, defaults);
                }
            } catch (error) {
                // The saved encrypted payload is unavailable or damaged; leave it untouched and use the embedded default.
            }

            const legacy = readLegacyConfig();
            const migrated = normalizeConfig(legacy || defaults, defaults);
            if (legacy && typeof legacy.password === "string" && legacy.password) {
                migrated.auth = await createPasswordRecord(legacy.password);
            }
            await persistConfig(migrated);
            localStorage.removeItem(legacyStorageKey);
            return migrated;
        }

        async function persistConfig(value = config) {
            const blob = await encryptPayload(value);
            localStorage.setItem(secureStorageKey, JSON.stringify(blob));
            localStorage.removeItem(legacyStorageKey);
        }

        function renderBall() {
            ball.innerHTML = "";
            const radius = 220;
            const activeRoster = config.roster.filter(item => item.enabled !== false);
            const total = activeRoster.length;
            const goldenRatio = (1 + Math.sqrt(5)) / 2;

            activeRoster.forEach((item, index) => {
                const tag = document.createElement("div");
                tag.className = "name-tag";
                tag.textContent = item.name;

                const theta = 2 * Math.PI * index / goldenRatio;
                const phi = Math.acos(1 - 2 * (index + 0.5) / total);
                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);

                tag.dataset.x = x;
                tag.dataset.y = y;
                tag.dataset.z = z;
                ball.appendChild(tag);
            });
        }

        function initBall() {
            renderBall();
            if (!animationId) animateBall();
        }

        function animateBall() {
            if (!isRolling) {
                currentRotationY += 0.2;
                currentRotationX += 0.1;
            } else {
                currentRotationY += 15;
                currentRotationX += 8;
            }

            const radX = currentRotationX * Math.PI / 180;
            const radY = currentRotationY * Math.PI / 180;
            const tags = document.querySelectorAll(".name-tag");
            const radius = 220;

            tags.forEach(tag => {
                const x = parseFloat(tag.dataset.x);
                const y = parseFloat(tag.dataset.y);
                const z = parseFloat(tag.dataset.z);
                const x1 = x * Math.cos(radY) - z * Math.sin(radY);
                const z1 = z * Math.cos(radY) + x * Math.sin(radY);
                const y2 = y * Math.cos(radX) - z1 * Math.sin(radX);
                const z2 = z1 * Math.cos(radX) + y * Math.sin(radX);

                tag.style.transform = `translate3d(${x1}px, ${y2}px, ${z2}px)`;
                tag.style.opacity = Math.max(0.2, (z2 + radius) / (2 * radius));
                tag.style.zIndex = Math.floor(z2);
            });

            animationId = requestAnimationFrame(animateBall);
        }

        function stopRoll() {
            isRolling = false;

            const activeRoster = config.roster.filter(item => item.enabled !== false);
            if (!activeRoster.length) {
                alert("请先进入抽取设置，勾选至少一个抽取名称。");
                return;
            }

            const winners = [];
            const actualCount = Math.min(selectCount, activeRoster.length);

            for (let index = 0; index < actualCount; index++) {
                const avoidNames = new Set(winners);
                const useHistory = drawHistory.length > 0 && Math.random() * 100 < config.repeatChance;
                let pool = [];

                if (useHistory) {
                    const historySet = new Set(drawHistory);
                    pool = activeRoster.filter(item => historySet.has(item.name) && !avoidNames.has(item.name) && item.weight > 0);
                }

                if (!pool.length) {
                    pool = activeRoster.filter(item => !avoidNames.has(item.name) && item.weight > 0);
                }

                if (!pool.length) {
                    pool = activeRoster.filter(item => !avoidNames.has(item.name));
                }

                const selected = weightedPick(pool);
                if (selected) winners.push(selected.name);
            }

            drawHistory = [...drawHistory, ...winners].slice(-500);
            void persistConfig();
            showResult(winners);
        }

        function weightedPick(pool) {
            const totalWeight = pool.reduce((sum, item) => sum + Math.max(0, Number(item.weight) || 0), 0);
            if (!pool.length) return null;
            if (totalWeight <= 0) return pool[Math.floor(Math.random() * pool.length)];

            let cursor = Math.random() * totalWeight;
            for (const item of pool) {
                cursor -= Math.max(0, Number(item.weight) || 0);
                if (cursor <= 0) return item;
            }
            return pool[pool.length - 1];
        }

        const confettiPalettes = {

        function getConfettiColor() {

        function startConfetti() {
            confettiActive = true;
            particles = [];
            for (let i = 0; i < 300; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    color: getConfettiColor(),
                    size: Math.random() * 10 + 5,
                    speedY: Math.random() * 3 + 2,
                    speedX: Math.random() * 2 - 1,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5
                });
            }
            animateConfetti();
        }

        function stopConfetti() {
            confettiActive = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.y += particle.speedY;
                particle.x += particle.speedX;
                particle.rotation += particle.rotationSpeed;
                if (particle.y > canvas.height) particle.y = -10;

                ctx.save();
                ctx.translate(particle.x, particle.y);
                ctx.rotate(particle.rotation * Math.PI / 180);
                ctx.fillStyle = particle.color;
                ctx.fillRect(-particle.size / 2, -particle.size / 2, particle.size, particle.size);
                ctx.restore();
            });
            requestAnimationFrame(animateConfetti);
        }

        async function handleRosterFile(file) {
            if (!file) return;
            try {
                const extension = file.name.split(".").pop().toLowerCase();
                if (extension === "doc") {
                    throw new Error("旧版 .doc 不能直接读取，请先用 Word 另存为 .docx 或 .txt 后再导入。");
                }
                if (extension !== "txt" && extension !== "docx") {
                    throw new Error("请选择 .txt 或 .docx 文件。");
                }

                const buffer = await file.arrayBuffer();
                const text = extension === "docx"
                    ? await extractDocxText(buffer)
                    : decodeTextBuffer(buffer);

                if (!parseImportedNames(text).length) {
                    throw new Error("没有识别到可导入的名称，请确认文件内容或在导入界面中手动修改。");
                }

        function decodeTextBuffer(buffer) {
            const bytes = new Uint8Array(buffer);
            if (bytes[0] === 0xFF && bytes[1] === 0xFE) return new TextDecoder("utf-16le").decode(bytes);
            if (bytes[0] === 0xFE && bytes[1] === 0xFF) return new TextDecoder("utf-16be").decode(bytes);
            if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) return new TextDecoder("utf-8").decode(bytes);

            const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
            const brokenChars = (utf8.match(/\uFFFD/g) || []).length;
            if (brokenChars) {
                try { return new TextDecoder("gb18030", { fatal: false }).decode(bytes); } catch (error) { return utf8; }
            }
            return utf8;
        }

        async function extractDocxText(buffer) {
            const xmlBytes = await readDocxZipEntry(new Uint8Array(buffer), "word/document.xml");
            if (!xmlBytes) throw new Error("未在该 Word 文件中找到正文内容。");

            const xml = new TextDecoder("utf-8").decode(xmlBytes);
            const documentXml = new DOMParser().parseFromString(xml, "application/xml");
            if (documentXml.querySelector("parsererror")) throw new Error("Word 文档内容无法解析。");

            const wordNs = "http://schemas.openxmlformats.org/wordprocessingml/2006/main";
            const paragraphs = [...documentXml.getElementsByTagNameNS(wordNs, "p")];
            const text = paragraphs.map(paragraph => {
                const fragments = [...paragraph.getElementsByTagNameNS(wordNs, "t")];
                return fragments.map(node => node.textContent || "").join("");
            }).join("\n");

            return text || [...documentXml.getElementsByTagNameNS(wordNs, "t")]
                .map(node => node.textContent || "")
                .join("\n");
        }

        function readUint16(bytes, offset) {
            return bytes[offset] | (bytes[offset + 1] << 8);
        }

        function readUint32(bytes, offset) {
            return (bytes[offset]
                | (bytes[offset + 1] << 8)
                | (bytes[offset + 2] << 16)
                | (bytes[offset + 3] << 24)) >>> 0;
        }

        async function readDocxZipEntry(bytes, targetName) {
            const endSignature = 0x06054B50;
            let endOffset = -1;
            const searchStart = Math.max(0, bytes.length - 65557);
            for (let offset = bytes.length - 22; offset >= searchStart; offset--) {
                if (readUint32(bytes, offset) === endSignature) {
                    endOffset = offset;
                    break;
                }
            }
            if (endOffset < 0) throw new Error("该文件不是有效的 .docx 文档。");

            const entryCount = readUint16(bytes, endOffset + 10);
            let centralOffset = readUint32(bytes, endOffset + 16);
            const centralSignature = 0x02014B50;
            const localSignature = 0x04034B50;
            const nameDecoder = new TextDecoder("utf-8");

            for (let index = 0; index < entryCount; index++) {
                if (readUint32(bytes, centralOffset) !== centralSignature) throw new Error("Word 文档压缩目录异常。");

                const flags = readUint16(bytes, centralOffset + 8);
                const compression = readUint16(bytes, centralOffset + 10);
                const compressedSize = readUint32(bytes, centralOffset + 20);
                const nameLength = readUint16(bytes, centralOffset + 28);
                const extraLength = readUint16(bytes, centralOffset + 30);
                const commentLength = readUint16(bytes, centralOffset + 32);
                const localOffset = readUint32(bytes, centralOffset + 42);
                const nameBytes = bytes.slice(centralOffset + 46, centralOffset + 46 + nameLength);
                const entryName = nameDecoder.decode(nameBytes);

                if (entryName === targetName) {
                    if (readUint32(bytes, localOffset) !== localSignature) throw new Error("Word 文档正文位置异常。");
                    const localNameLength = readUint16(bytes, localOffset + 26);
                    const localExtraLength = readUint16(bytes, localOffset + 28);
                    const dataStart = localOffset + 30 + localNameLength + localExtraLength;
                    const compressed = bytes.slice(dataStart, dataStart + compressedSize);

                    if (compression === 0) return compressed;
                    if (compression !== 8) throw new Error("该 Word 文件使用了不支持的压缩格式。");
                    if (!("DecompressionStream" in window)) {
                        throw new Error("当前浏览器不支持 .docx 解压，请使用最新版 Chrome、Edge 或 Safari，或先另存为 .txt。\n");
                    }
                    const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
                    return new Uint8Array(await new Response(stream).arrayBuffer());
                }

                centralOffset += 46 + nameLength + extraLength + commentLength;
            }
            return null;
        }

        function confirmRosterImport() {
            const imported = parseImportedNames(importNamesText.value);
            const mode = document.querySelector('input[name="importMode"]:checked').value;
            if (!imported.length) {
                importStatus.textContent = "请至少保留一个可导入的名称。";
                importNamesText.focus();
                return;
            }

            if (mode === "replace") {
                renderRosterEditor(imported.map(name => ({ name, weight: 1 })));
                hideRosterImport();
                return;
            }

            const existing = getCurrentEditorNames();
            const toAdd = imported.filter(name => !existing.has(name));
            if (!toAdd.length) {
                importStatus.textContent = "没有可新增的名称，导入内容均已在当前名单中。";
                return;
            }

            toAdd.forEach(name => rosterBody.appendChild(createRosterRow(name, 1)));
            updateProbabilityLabels();
            hideRosterImport();
        }

        function renderRosterEditor(roster) {
            rosterBody.innerHTML = "";
            roster.forEach(item => rosterBody.appendChild(createRosterRow(item.name, item.weight, item.enabled !== false)));
            updateProbabilityLabels();
        }

        function createRosterRow(name = "", weight = 1, enabled = true) {
            const row = document.createElement("tr");

            const nameCell = document.createElement("td");
            nameCell.className = "roster-name-cell";

            const checkInput = document.createElement("input");
            checkInput.type = "checkbox";
            checkInput.checked = enabled;
            checkInput.className = "roster-check";
            checkInput.setAttribute("aria-label", `选择 ${name || "此抽取名称"}`);
            checkInput.title = "勾选后参与抽取";
            checkInput.addEventListener("change", () => {
                row.classList.toggle("is-unselected", !checkInput.checked);
                updateProbabilityLabels();
            });

            const nameInput = document.createElement("input");
            nameInput.type = "text";
            nameInput.value = name;
            nameInput.maxLength = 40;
            nameInput.className = "roster-name";
            nameInput.setAttribute("aria-label", "抽取名称");
            nameInput.addEventListener("input", () => {
                checkInput.setAttribute("aria-label", `选择 ${nameInput.value.trim() || "此抽取名称"}`);
            });
            nameCell.append(checkInput, nameInput);

            const weightCell = document.createElement("td");
            const weightInput = document.createElement("input");
            weightInput.type = "number";
            weightInput.min = "0";
            weightInput.max = "9999";
            weightInput.step = "0.1";
            weightInput.value = weight;
            weightInput.className = "weight-input";
            weightInput.setAttribute("aria-label", "随机权重");
            weightInput.addEventListener("input", updateProbabilityLabels);
            weightCell.appendChild(weightInput);

            const probabilityCell = document.createElement("td");
            probabilityCell.className = "probability-cell";
            probabilityCell.textContent = "0%";

            const actionCell = document.createElement("td");
            const removeButton = document.createElement("button");
            removeButton.type = "button";
            removeButton.textContent = "删除";
            removeButton.addEventListener("click", () => {
                row.remove();
                updateProbabilityLabels();
            });
            actionCell.appendChild(removeButton);

            row.classList.toggle("is-unselected", !enabled);
            row.append(nameCell, weightCell, probabilityCell, actionCell);
            return row;
        }

        function addRosterRow() {
            const row = createRosterRow("", 1, true);
            rosterBody.appendChild(row);
            updateProbabilityLabels();
            row.querySelector(".roster-name").focus();
        }

        function updateSelectAllRosterState() {
            const checks = [...rosterBody.querySelectorAll(".roster-check")];
            const selectedCount = checks.filter(check => check.checked).length;
            selectAllRoster.checked = checks.length > 0 && selectedCount === checks.length;
            selectAllRoster.indeterminate = selectedCount > 0 && selectedCount < checks.length;
            selectAllRoster.title = selectAllRoster.checked ? "取消全选" : "全选";
        }

        function updateProbabilityLabels() {
            const rows = [...rosterBody.querySelectorAll("tr")];
            const enabledRows = rows.filter(row => row.querySelector(".roster-check")?.checked);
            const total = enabledRows.reduce((sum, row) => {
                return sum + clampNumber(row.querySelector(".weight-input").value, 0, 9999, 0);
            }, 0);

            rows.forEach(row => {
                const isEnabled = row.querySelector(".roster-check")?.checked;
                const weight = clampNumber(row.querySelector(".weight-input").value, 0, 9999, 0);
                const cell = row.querySelector(".probability-cell");
                const percent = isEnabled && total > 0 ? (weight / total) * 100 : 0;
                cell.textContent = isEnabled ? `${percent.toFixed(percent >= 10 ? 1 : 2)}%` : "—";
                row.classList.toggle("is-unselected", !isEnabled);
            });

            updateSelectAllRosterState();
        }

        function collectRoster() {
            return sanitizeRoster([...rosterBody.querySelectorAll("tr")].map(row => ({
                name: row.querySelector(".roster-name").value,
                weight: row.querySelector(".weight-input").value,
                enabled: row.querySelector(".roster-check").checked
            })));
        }

        async function saveSettings() {
            const roster = collectRoster();
            const enabledRoster = roster.filter(item => item.enabled !== false);
            if (enabledRoster.length && !enabledRoster.some(item => item.weight > 0)) enabledRoster[0].weight = 1;
            const title = document.getElementById("settingTitle").value.trim().slice(0, 30) || emptyConfig.title;
            const requestedPassword = document.getElementById("settingPassword").value;
            const theme = document.getElementById("settingTheme").value;

            let auth = config.auth;
            if (requestedPassword) auth = await createPasswordRecord(requestedPassword);

            config = {
                ...config,
                title,
                auth,
                theme: supportedThemes.includes(theme) ? theme : emptyConfig.theme,
                repeatChance: clampNumber(repeatChanceValue.value, 0, 100, 0),
                roster
            };

            drawHistory = drawHistory.filter(name => config.roster.some(item => item.name === name && item.enabled !== false));
            try {
                await persistConfig();
            } catch (error) {
                alert("保存失败：当前浏览器无法完成本地加密存储。请使用新版 Chrome、Edge 或 Safari。\n");
                return;
            }
            applyAppearance();
            renderBall();
            hideSettings();
        }

        window.onload = async function() {
            try {
                config = await loadConfig();
                appReady = true;
                applyAppearance();
                initStars();
                initBall();
                bindHiddenAccess();
                bindThemePicker();
            } catch (error) {
                pageTitle.textContent = "浏览器不支持加密存储";
                startBtn.disabled = true;
            }
        };
    </script>
</body>
</html>
